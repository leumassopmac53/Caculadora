<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc</title>
    
    <style>
        /* VARIAVEIS */
        :root {
          --bg: hsl(120,30%,5%);
          --numeros: hsla(30,40%,80%,0.2);
          --operadores: hsla(30,40%,80%,0.2);
          --pontos: hsla(30,40%,80%,0.2);
          --result: hsl(120,70%,40%);
          --efect: hsla(30,40%,85%,0.5);
          
          --brd-radius: 48px;
          
          --text: hsl(30,40%,80%);
        }
        
        /* reset */
      *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        color: var(--text);
      }
      
      /* body */
      body {
        padding: 0px;
        gap: 0px;
        height: 100dvh;
        
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto 2fr;
        grid-template-areas: 
        "header"
        "main"
        "nav"
        "aside";
      }
      
        /* All */
        header,main,aside,nav {
          padding: 12px;
          background: var(--bg);
        }
        
        
        /* SEMANTICOS */
        /* header */
        header {
          grid-area: header;
        }
        
        /* main */
        main {
          grid-area: main;
          display: flex;
          flex-direction: column;
          justify-content: center;
          overflow-x: auto;
        }
        
        /* aside */
        aside {
          grid-area: aside;
          height: 100%;
          gap: 12px;
          
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          grid-template-rows: repeat(5, 1fr);
        }
      
        /* nav */
        nav {
          grid-area: nav;
          display: flex;
          flex-direction: column;
        }
        
      /* numeros */
      .numero {
        background: var(--numeros);
        font-size: 20px;
        outline: none;
        border-radius: var(--brd-radius);
        border: 1px solid var(--numeros);
        transition: 0.3s;
      }
      
      /* operadores */
      .operador {
        background: var(--operadores);
        font-size: 20px;
        outline: none;
        border-radius: var(--brd-radius);
        border: 1px solid var(--operadores);
        transition: 0.3s;
      }
      
      /* pontuações */
      .ponto {
        background: var(--pontos);
        font-size: 20px;
        outline: none;
        border-radius: var(--brd-radius);
        border: 1px solid var(--pontos);
        transition: 0.3s;
      }
      
      /* resultado */
      .result {
        background: var(--result);
        font-size: 20px;
        outline: none;
        border-radius: var(--brd-radius);
        border: 1px solid var(--result);
        transition: 0.3s;
        grid-row: span 3;
      }
      
      /* efeito */
      .operador:active,.numero:active,.ponto:active,.result:active {
        background: var(--efect);
        font-size: 15px;
      }
      
      /* numero zero*/
      .zero {
        grid-column: span 2;
      }
    </style>
  </head>
  
  
  <body>
    <!-- header -->
    <header>
      
    </header>
    
    <!-- main -->
    <main>
      <h2 id="main"></h2>
    </main>
    
    <!-- nav -->
    <nav>
        <hr>
      </nav>
      
    <!-- aside -->
    <aside>
      <button class="operador">C</button>
      <button class="operador">÷</button>
      <button class="operador">×</button>
      <button class="operador">-</button>
      
      <button class="numero">7</button>
      <button class="numero">8</button>
      <button class="numero">9</button>
      <button class="operador">+</button>
      
      
      <button class="numero">4</button>
      <button class="numero">5</button>
      <button class="numero">6</button>
      
      
      <button class="result">=</button>
      <button class="numero">1</button>
      <button class="numero">2</button>
      <button class="numero">3</button>
      
      
      <button class="numero zero">0</button>
      <button class="ponto">,</button>
      
    </aside>
    
    <script>
      let numeros = document.querySelectorAll(".numero")
      
      let operadores = document.querySelectorAll(".operador")
      
      let pontos = document.querySelectorAll(".ponto")

      let main = document.getElementById("main")
      let result = document.querySelector(".result")
      
      function trocaDisplay(){
        main.innerText = expressao
      }
      /* expressão */
      let expressao = "";
      numeros.forEach(n =>{
        n.addEventListener("click",() =>{
         expressao += n.innerText;
         trocaDisplay();
        })
      })
      
      operadores.forEach(o =>{
        o.addEventListener("click",() =>{
          if(o.innerText === "C"){
            expressao = "";
            trocaDisplay();
          }
          else {
          expressao += o.innerText;
          trocaDisplay();
          }
        })
      })
      
      pontos.forEach(p =>{
        p.addEventListener("click",() =>{
          expressao += p.innerText;
          trocaDisplay();
        })
      })
      result.addEventListener("click", ()=>{
        try {
        expressao = expressao.replaceAll(",",".")
        expressao = expressao.replaceAll("×","*")
        expressao = expressao.replaceAll("÷","/")
        let r = eval(expressao).toString()
        main.innerText = r
        expressao = ""
        }
        catch (erro) {
          console.log(erro)
          main.innerText = "Invalido"
          expressao = ""
        }
      })
    </script>
  </body>
</html>
